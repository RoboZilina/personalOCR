<!DOCTYPE html>
<html>
<head>
    <title>Auto-Capture Diagnostic Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .log { background: #f5f5f5; border: 1px solid #ddd; padding: 10px; margin: 10px 0; font-family: monospace; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
        button { padding: 10px 15px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .status { padding: 5px 10px; margin: 5px; border-radius: 3px; }
        .status-on { background: #28a745; color: white; }
        .status-off { background: #dc3545; color: white; }
    </style>
</head>
<body>
    <h1>Auto-Capture Diagnostic Test</h1>
    
    <div class="test-section">
        <h2>1. Check Auto-Capture Elements</h2>
        <button id="check-elements">Check DOM Elements</button>
        <div class="log" id="element-log"></div>
    </div>
    
    <div class="test-section">
        <h2>2. Test Auto-Capture Button</h2>
        <p>Simulated auto-capture button (like in the real app):</p>
        <input type="checkbox" id="auto-capture-toggle" style="display:none">
        <button id="auto-capture-btn">AUTO CAPTURE</button>
        <div>Checkbox checked: <span id="checkbox-status" class="status status-off">OFF</span></div>
        <div class="log" id="button-log"></div>
    </div>
    
    <div class="test-section">
        <h2>3. Test Settings System</h2>
        <button id="test-settings">Test Settings Load/Save</button>
        <div class="log" id="settings-log"></div>
    </div>
    
    <div class="test-section">
        <h2>4. Simulate Auto-Capture Logic</h2>
        <button id="simulate-capture">Simulate checkAutoCapture()</button>
        <div class="log" id="logic-log"></div>
    </div>
    
    <script>
        const elementLog = document.getElementById('element-log');
        const buttonLog = document.getElementById('button-log');
        const settingsLog = document.getElementById('settings-log');
        const logicLog = document.getElementById('logic-log');
        const checkboxStatus = document.getElementById('checkbox-status');
        const autoToggle = document.getElementById('auto-capture-toggle');
        const autoBtn = document.getElementById('auto-capture-btn');
        
        // 1. Check DOM Elements
        document.getElementById('check-elements').onclick = function() {
            elementLog.textContent = 'Checking for auto-capture elements...\n';
            
            // Check if elements exist in the real app
            const elements = [
                'auto-capture-toggle',
                'auto-capture-btn',
                'auto-capture-toggle:checked'
            ];
            
            elements.forEach(id => {
                try {
                    const elem = document.getElementById(id.replace(/:checked$/, ''));
                    if (elem) {
                        const isChecked = id.includes(':checked') ? elem.checked : 'N/A';
                        elementLog.textContent += `✓ Found: ${id} (checked: ${isChecked})\n`;
                    } else {
                        elementLog.textContent += `✗ Missing: ${id}\n`;
                    }
                } catch (e) {
                    elementLog.textContent += `Error checking ${id}: ${e.message}\n`;
                }
            });
        };
        
        // 2. Test Auto-Capture Button
        autoBtn.onclick = function() {
            buttonLog.textContent = 'Auto-capture button clicked\n';
            
            // Simulate the app's logic: click the hidden checkbox
            if (autoToggle) {
                autoToggle.click();
                const isChecked = autoToggle.checked;
                buttonLog.textContent += `Checkbox clicked. New state: ${isChecked ? 'CHECKED' : 'UNCHECKED'}\n`;
                
                // Update status display
                checkboxStatus.textContent = isChecked ? 'ON' : 'OFF';
                checkboxStatus.className = `status ${isChecked ? 'status-on' : 'status-off'}`;
                
                // Test if onchange fires
                buttonLog.textContent += `Testing if onchange event fires...\n`;
            } else {
                buttonLog.textContent += 'ERROR: Checkbox not found\n';
            }
        };
        
        // Add onchange handler to checkbox
        autoToggle.onchange = function(e) {
            buttonLog.textContent += `✓ Checkbox onchange fired! checked=${e.target.checked}\n`;
        };
        
        // 3. Test Settings System
        document.getElementById('test-settings').onclick = function() {
            settingsLog.textContent = 'Testing settings system...\n';
            
            // Simulate localStorage settings
            const STORAGE_KEY = "vnocr_settings";
            const defaultSettings = {
                autoCapture: true,
                ocrEngine: "tesseract",
                ocrMode: "default_mini"
            };
            
            try {
                // Check current storage
                const stored = localStorage.getItem(STORAGE_KEY);
                settingsLog.textContent += `Current storage: ${stored || '(empty)'}\n`;
                
                // Test save
                const testSettings = { ...defaultSettings, autoCapture: autoToggle.checked };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(testSettings));
                settingsLog.textContent += `Saved settings: ${JSON.stringify(testSettings)}\n`;
                
                // Test load
                const loaded = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
                settingsLog.textContent += `Loaded autoCapture: ${loaded.autoCapture}\n`;
                
            } catch (e) {
                settingsLog.textContent += `Error: ${e.message}\n`;
            }
        };
        
        // 4. Simulate Auto-Capture Logic
        document.getElementById('simulate-capture').onclick = function() {
            logicLog.textContent = 'Simulating checkAutoCapture() logic...\n';
            
            // Simulate the conditions from checkAutoCapture()
            const conditions = [
                { name: 'autoToggle exists', value: !!autoToggle, pass: !!autoToggle },
                { name: 'autoToggle.checked', value: autoToggle?.checked, pass: autoToggle?.checked },
                { name: 'videoStream (simulated)', value: 'null (no capture)', pass: false },
                { name: 'activeSelection (simulated)', value: 'null (no selection)', pass: false }
            ];
            
            conditions.forEach(cond => {
                logicLog.textContent += `${cond.pass ? '✓' : '✗'} ${cond.name}: ${cond.value}\n`;
            });
            
            logicLog.textContent += '\nKey insight: auto-capture requires:\n';
            logicLog.textContent += '1. Checkbox checked ✓\n';
            logicLog.textContent += '2. Video stream active (screen capture)\n';
            logicLog.textContent += '3. Selection rectangle defined\n';
            logicLog.textContent += '4. Engine ready\n';
            logicLog.textContent += '5. Not currently processing\n';
        };
        
        // Initialize
        elementLog.textContent = 'Diagnostic tool ready. Click buttons to test.\n';
    </script>
</body>
</html>
